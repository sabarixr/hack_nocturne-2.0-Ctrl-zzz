services:
  backend:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - .:/app
      - ./models:/app/models
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request,json; r=urllib.request.urlopen(urllib.request.Request('http://localhost:8000/graphql',data=b'{\\\"query\\\":\\\"{health}\\\"}',headers={'Content-Type':'application/json'})); exit(0 if json.loads(r.read()).get('data') else 1)\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py loaddata apps/signs/fixtures/signs.json &&
             daphne -b 0.0.0.0 -p 8000 signbridge.asgi:application"

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: signbridge
      POSTGRES_USER: signbridge
      POSTGRES_PASSWORD: signbridge
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U signbridge"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
